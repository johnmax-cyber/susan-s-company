<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - Susan's Company</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #1a4a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 30px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-size: 14px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1a4a2e; }
    .login-btn {
      width: 100%;
      padding: 14px;
      background-color: #1a4a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .login-btn:hover { background-color: #153a25; }
    .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .error-message {
      margin-top: 20px;
      color: #d32f2f;
      font-size: 14px;
      min-height: 20px;
    }
    @media (max-width: 480px) {
      .login-card { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Susan's Company</div>
    <div class="subtitle">Admin Panel — Staff Only</div>
    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>
    <div class="error-message" id="errorMessage"></div>
  </div>
  <script>
    const supabaseUrl = 'https://kyknrxolzctljahlegsc.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5a25yeG9semN0bGphaGxlZ3NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjIzNjcsImV4cCI6MjA5NDQzODM2N30.KoJM7dKRtTwOiWIT5VmVpeNqSGJOIts2qQhWsAYoWJM';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.textContent = '';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: emailInput.value,
        password: passwordInput.value
      });
      if (error) {
        errorMessage.textContent = 'Wrong email or password. Please try again.';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      } else {
        window.location.href = 'admin-dashboard.html';
      }
    });
  </script>
</body>
</html>
