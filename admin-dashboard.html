<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Susan's Company</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: none;
    }
    .container { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px;
      background-color: #1a4a2e;
      color: #fff;
      padding: 20px 0;
      flex-shrink: 0;
    }
    .sidebar-logo {
      font-size: 22px;
      font-weight: 700;
      color: #d4af37;
      padding: 0 20px 30px;
      border-bottom: 1px solid #2a5a3e;
    }
    .nav-item {
      padding: 14px 20px;
      cursor: pointer;
      transition: background-color 0.2s;
      font-size: 15px;
    }
    .nav-item:hover { background-color: #2a5a3e; }
    .nav-item.logout { color: #ff6b6b; margin-top: auto; }
    .nav-item.logout:hover { background-color: #c0392b; }
    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .welcome {
      font-size: 24px;
      color: #1a4a2e;
      margin-bottom: 30px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .stat-number {
      font-size: 36px;
      font-weight: 700;
      color: #1a4a2e;
    }
    .stat-label {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .action-btn {
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background-color: #1a4a2e;
      color: #fff;
    }
    .btn-primary:hover { background-color: #153a25; }
    .btn-secondary {
      background-color: #d4af37;
      color: #1a4a2e;
    }
    .btn-secondary:hover { background-color: #b8962c; }
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; height: auto; }
      .main-content { padding: 20px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-logo">Susan's Company</div>
      <div class="nav-item" onclick="location.href='admin-dashboard.html'">Dashboard</div>
      <div class="nav-item" onclick="location.href='admin-products.html'">Products</div>
      <div class="nav-item" onclick="location.href='admin-messages.html'">Messages</div>
      <div class="nav-item logout" onclick="logout()">Logout</div>
    </div>
    <div class="main-content">
      <div class="welcome" id="welcomeMsg">Welcome back, Susan! 👋</div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-number" id="totalProducts">—</div>
          <div class="stat-label">Total Products</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="unreadMessages">—</div>
          <div class="stat-label">Unread Messages</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="inStock">—</div>
          <div class="stat-label">In Stock</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="outOfStock">—</div>
          <div class="stat-label">Out of Stock</div>
        </div>
      </div>
      <div class="actions">
        <a href="admin-products.html" class="action-btn btn-primary">Quick Add Product</a>
        <a href="admin-messages.html" class="action-btn btn-secondary">View Messages</a>
      </div>
    </div>
  </div>
  <script>
    const supabaseClient = window.supabase.createClient(
      'https://kyknrxolzctljahlegsc.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5a25yeG9semN0bGphaGxlZ3NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjIzNjcsImV4cCI6MjA5NDQzODM2N30.KoJM7dKRtTwOiWIT5VmVpeNqSGJOIts2qQhWsAYoWJM'
    );
    async function checkAuth() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) {
        window.location.href = 'admin-login.html';
        return;
      }
      document.body.style.display = 'flex';
      fetchStats();
    }
    async function fetchStats() {
      const [{ count: totalProducts }, { count: unreadMessages }, { count: inStock }, { count: outOfStock }] = await Promise.all([
        supabaseClient.from('products').select('*', { count: 'exact', head: true }),
        supabaseClient.from('messages').select('*', { count: 'exact', head: true }).eq('is_read', false),
        supabaseClient.from('products').select('*', { count: 'exact', head: true }).eq('in_stock', true),
        supabaseClient.from('products').select('*', { count: 'exact', head: true }).eq('in_stock', false)
      ]);
      document.getElementById('totalProducts').textContent = totalProducts || 0;
      document.getElementById('unreadMessages').textContent = unreadMessages || 0;
      document.getElementById('inStock').textContent = inStock || 0;
      document.getElementById('outOfStock').textContent = outOfStock || 0;
    }
    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = 'admin-login.html';
    }
    checkAuth();
  </script>
</body>
</html>
