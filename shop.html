<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Susan's Company - Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fafaf8;
            color: #333;
            line-height: 1.6;
            font-weight: 400;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        :root {
            --primary-dark: #1a4a2e;
            --primary-gold: #c9a84c;
            --background: #fafaf8;
            --text: #333;
            --text-light: #666;
        }

        nav {
            position: sticky;
            top: 0;
            background: var(--primary-dark);
            color: var(--primary-gold);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            color: var(--primary-gold);
            font-size: 24px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tagline {
            font-size: 12px;
            color: var(--primary-gold);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .nav-links a {
            color: var(--primary-gold);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: white;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--primary-gold);
            font-size: 24px;
            cursor: pointer;
        }

        section {
            padding: 80px 5%;
        }

        .page-heading {
            text-align: center;
            color: var(--primary-dark);
            font-size: 42px;
            margin-bottom: 60px;
            font-family: 'Playfair Display', serif;
        }

        .section-heading {
            text-align: center;
            color: var(--primary-dark);
            font-size: 32px;
            margin-bottom: 40px;
            font-family: 'Playfair Display', serif;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        /* Filter Controls */
        .product-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }
        
        #search-input {
            padding: 12px 16px;
            border: 2px solid var(--primary-dark);
            border-radius: 50px;
            font-size: 16px;
            width: 250px;
            transition: all 0.3s;
        }
        
        #search-input:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
        }
        
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--primary-dark);
            background: white;
            color: var(--primary-dark);
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .filter-btn:hover:not(.active) {
            background: var(--primary-dark);
            color: white;
        }
        
        .filter-btn.active {
            background: var(--primary-dark);
            color: white;
        }
        
        .filter-btn:active {
            transform: scale(0.95);
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.4s, box-shadow 0.4s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
        }

        .product-img {
            height: 200px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #2a4a6f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Playfair Display', serif;
            text-align: center;
        }

        .product-info {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-info h3 {
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-size: 20px;
            font-weight: 600;
        }

        .product-info p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
            flex-grow: 1;
        }

        .price {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-gold);
            margin: 15px 0;
        }

        .original-price {
            text-decoration: line-through;
            color: var(--text-light);
            font-size: 16px;
            margin-bottom: 5px;
        }

        .discount-price {
            font-size: 18px;
            font-weight: 600;
            color: #d32f2f;
        }

        .order-btn {
            background: var(--primary-dark);
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin-top: auto;
        }
        
        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }

        .order-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 74, 46, 0.25);
            background-color: var(--primary-dark);
        }

        .out-of-stock {
            background: #ccc;
            color: #666;
            border: none;
            padding: 12px 20px;
            width: 100%;
            font-weight: 500;
            border-radius: 50px;
            font-size: 16px;
            cursor: not-allowed;
            margin-top: auto;
        }

        .loading, .error {
            text-align: center;
            padding: 40px;
            color: var(--primary-dark);
            font-size: 18px;
            grid-column: 1 / -1;
        }

        .error {
            color: #d32f2f;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                background: var(--primary-dark);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding: 0;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                width: 100%;
            }

            .nav-links a {
                display: block;
                padding: 15px 20px;
                color: var(--primary-gold);
                text-decoration: none;
                font-size: 16px;
                font-weight: 500;
                transition: color 0.3s;
            }

            .nav-links a:hover {
                color: white;
            }

            .menu-toggle {
                display: block;
            }

            .page-heading {
                font-size: 32px;
            }

            .section-heading {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo-container">
            <div class="logo">Susan's Company</div>
            <div class="tagline">Modest Fashion & Books — Nairobi</div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="menu-toggle" id="menuToggle">☰</button>
    </nav>

    <section>
        <h1 class="page-heading">Our Products</h1>
        
        <div id="loading-message" class="loading">Loading products...</div>
        <div id="error-message" class="error" style="display: none;"></div>
        
        <!-- Search and Filter Controls -->
        <div class="product-filters">
            <input type="text" id="search-input" placeholder="🔍 Search products...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Products</button>
                <button class="filter-btn" data-filter="clothes">Clothes</button>
                <button class="filter-btn" data-filter="books">Books</button>
                <button class="filter-btn" data-filter="sale">On Sale</button>
            </div>
        </div>
        
        <!-- Products Container -->
        <div id="products-container" class="products"></div>
    </section>

    <!-- Load Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase public anon credentials — safe to expose in frontend
        const supabaseUrl = 'https://kyknrxolzctljahlegsc.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5a25yeG9semN0bGphaGxlZ3NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjIzNjcsImV4cCI6MjA5NDQzODM2N30.KoJM7dKRtTwOiWIT5VmVpeNqSGJOIts2qQhWsAYoWJM';

        if (!supabaseUrl || !supabaseAnonKey) {
            console.error('Missing Supabase configuration');
        } else {
            const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

            // DOM elements
            const loadingMessage = document.getElementById('loading-message');
            const errorMessage = document.getElementById('error-message');
            const productsContainer = document.getElementById('products-container');
            const searchInput = document.getElementById('search-input');
            const filterButtons = document.querySelectorAll('.filter-btn');

            // State
            let allProducts = [];
            let currentFilter = 'all';
            let currentSearch = '';

            // Fetch products from Supabase
            async function fetchProducts() {
                try {
                    loadingMessage.style.display = 'block';
                    errorMessage.style.display = 'none';
                    
                    // Clear container
                    productsContainer.innerHTML = '';

                    // Fetch all products
                    const { data, error } = await supabaseClient
                        .from('products')
                        .select('*');

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        showError('No products found');
                        return;
                    }

                    // Store all products
                    allProducts = data;
                    
                    // Apply current filters and display
                    applyFiltersAndDisplay();

                } catch (err) {
                    showError('Failed to load products. Please check your connection and try again.');
                    console.error('Error fetching products:', err);
                } finally {
                    loadingMessage.style.display = 'none';
                }
            }

            // Apply filters and display products
            function applyFiltersAndDisplay() {
                // Filter by search term
                let filteredProducts = allProducts.filter(product => 
                    product.name.toLowerCase().includes(currentSearch.toLowerCase())
                );

                // Filter by category/sale
                if (currentFilter === 'clothes') {
                    filteredProducts = filteredProducts.filter(product => product.category === 'clothes');
                } else if (currentFilter === 'books') {
                    filteredProducts = filteredProducts.filter(product => product.category === 'books');
                } else if (currentFilter === 'sale') {
                    filteredProducts = filteredProducts.filter(product => product.discount_price !== null);
                }
                // 'all' filter keeps all products (no additional filtering)

                // Display products
                displayProducts(filteredProducts);
            }

            // Display products in the container
            function displayProducts(products) {
                // Clear container
                productsContainer.innerHTML = '';

                if (products.length === 0) {
                    productsContainer.innerHTML = '<p class="error">No products match your filters</p>';
                    return;
                }

                // Create and append product cards
                products.forEach(product => {
                    const productCard = createProductCard(product);
                    productsContainer.appendChild(productCard);
                });
            }

            // Create product card element
            function createProductCard(product) {
                const card = document.createElement('div');
                card.className = 'product-card';

                const imgDiv = document.createElement('div');
                imgDiv.className = 'product-img';
                imgDiv.textContent = product.name.substring(0, 15) + (product.name.length > 15 ? '...' : '');
                card.appendChild(imgDiv);

                const infoDiv = document.createElement('div');
                infoDiv.className = 'product-info';

                const nameH3 = document.createElement('h3');
                nameH3.textContent = product.name;
                infoDiv.appendChild(nameH3);

                const descP = document.createElement('p');
                descP.textContent = product.description || 'No description available';
                infoDiv.appendChild(descP);

                const priceDiv = document.createElement('div');
                priceDiv.className = 'price';

                if (product.discount_price && product.discount_price > 0) {
                    const originalPrice = document.createElement('div');
                    originalPrice.className = 'original-price';
                    originalPrice.textContent = `KSh ${product.price ? product.price.toLocaleString() : '0'}`;
                    priceDiv.appendChild(originalPrice);

                    const discountPrice = document.createElement('div');
                    discountPrice.className = 'discount-price';
                    discountPrice.textContent = `KSh ${product.discount_price.toLocaleString()}`;
                    priceDiv.appendChild(discountPrice);
                } else {
                    priceDiv.textContent = `KSh ${product.price ? product.price.toLocaleString() : '0'}`;
                }
                infoDiv.appendChild(priceDiv);

                // Add order button or out of stock message
                if (product.in_stock !== false) {
                    const orderBtn = document.createElement('button');
                    orderBtn.className = 'order-btn';
                    orderBtn.textContent = 'Order Now';
                    orderBtn.addEventListener('click', async function() {
                        // Save order to Supabase
                        try {
                            await supabaseClient
                                .from('orders')
                                .insert({
                                    product_name: product.name,
                                    product_id: product.id,
                                    status: 'pending'
                                });
                            
                            // Show toast notification
                            showToast('Opening WhatsApp... Your order is being tracked!');
                            
                            // Open WhatsApp
                            window.open(`https://wa.me/254700000000?text=${encodeURIComponent(product.whatsapp_message || 'I would like to place an order')}`, '_blank');
                        } catch (error) {
                            console.error('Error saving order:', error);
                            showToast('Error saving order. Please try again.', 'error');
                            // Still open WhatsApp even if order saving fails
                            window.open(`https://wa.me/254700000000?text=${encodeURIComponent(product.whatsapp_message || 'I would like to place an order')}`, '_blank');
                        }
                    });
                    infoDiv.appendChild(orderBtn);
                } else {
                    const outOfStock = document.createElement('div');
                    outOfStock.className = 'out-of-stock';
                    outOfStock.textContent = 'Out of Stock';
                    infoDiv.appendChild(outOfStock);
                }

                card.appendChild(infoDiv);
                return card;
            }

             // Show error message
             function showError(message) {
                 errorMessage.textContent = message;
                 errorMessage.style.display = 'block';
             }

             // Show toast notification
             function showToast(message, type = 'success') {
                 const toast = document.getElementById('order-toast');
                 toast.textContent = message;
                 toast.className = 'toast show';
                 
                 // Hide toast after 3 seconds
                 setTimeout(() => {
                     toast.className = 'toast';
                 }, 3000);
             }

            // Event listeners
            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value.trim();
                applyFiltersAndDisplay();
            });

            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // Update active button
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    
                    // Update filter
                    currentFilter = button.dataset.filter;
                    
                    // Apply filters
                    applyFiltersAndDisplay();
                });
            });

            // Mobile menu toggle
            document.getElementById('menuToggle').addEventListener('click', function() {
                const navLinks = document.querySelector('.nav-links');
                navLinks.classList.toggle('active');
            });

            // Close mobile menu when clicking a link
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', function() {
                    const navLinks = document.querySelector('.nav-links');
                    navLinks.classList.remove('active');
                });
            });

            // Initialize
            document.addEventListener('DOMContentLoaded', fetchProducts);
        }
    </script>
    
    <!-- Toast Notification -->
    <div id="order-toast" class="toast"></div>
</body>
</html>
