<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Susan's Company - Shop</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <meta name="description" content="Susan's Company — Nairobi's home for modest fashion and inspiring books. Shop quality clothing and books in Nairobi, Kenya.">
    <meta name="keywords" content="modest fashion Nairobi, Islamic clothing Kenya, books Nairobi, Susan's Company">
    <meta property="og:title" content="Susan's Company — Nairobi">
    <meta property="og:description" content="Modest fashion and inspiring books in Nairobi">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://kyknrxolzctljahlegsc.supabase.co">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
        }
        img {
            loading: lazy;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fafaf8;
            color: #333;
            line-height: 1.6;
            font-weight: 400;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        :root {
            --primary-dark: #1a4a2e;
            --primary-gold: #c9a84c;
            --background: #fafaf8;
            --text: #333;
            --text-light: #666;
        }

        nav {
            position: sticky;
            top: 0;
            background: var(--primary-dark);
            color: var(--primary-gold);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            color: var(--primary-gold);
            font-size: 24px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tagline {
            font-size: 12px;
            color: var(--primary-gold);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .nav-links a {
            color: var(--primary-gold);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: white;
        }

        .nav-links a.active {
            color: white;
            font-weight: 700;
            text-decoration: underline;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--primary-gold);
            font-size: 24px;
            cursor: pointer;
        }

        section {
            padding: 80px 5%;
        }

        .page-heading {
            text-align: center;
            color: var(--primary-dark);
            font-size: 42px;
            margin-bottom: 60px;
            font-family: 'Playfair Display', serif;
        }

        .section-heading {
            text-align: center;
            color: var(--primary-dark);
            font-size: 32px;
            margin-bottom: 40px;
            font-family: 'Playfair Display', serif;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        /* Filter Controls */
        .product-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }
        
        #search-input {
            padding: 12px 16px;
            border: 2px solid var(--primary-dark);
            border-radius: 50px;
            font-size: 16px;
            width: 250px;
            transition: all 0.3s;
        }
        
        #search-input:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
        }
        
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--primary-dark);
            background: white;
            color: var(--primary-dark);
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .filter-btn:hover:not(.active) {
            background: var(--primary-dark);
            color: white;
        }
        
        .filter-btn.active {
            background: var(--primary-dark);
            color: white;
        }
        
        .filter-btn:active {
            transform: scale(0.95);
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.4s, box-shadow 0.4s;
            display: flex;
            flex-direction: column;
        }

        .product-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .product-img {
            height: 200px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #2a4a6f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Playfair Display', serif;
            text-align: center;
        }

        .product-info {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-info h3 {
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-size: 20px;
            font-weight: 600;
        }

        .product-info p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
            flex-grow: 1;
        }

        .price {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-gold);
            margin: 15px 0;
        }

        .original-price {
            text-decoration: line-through;
            color: var(--text-light);
            font-size: 16px;
            margin-bottom: 5px;
        }

        .discount-price {
            font-size: 18px;
            font-weight: 600;
            color: #d32f2f;
        }

        .order-btn {
            background: var(--primary-dark);
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin-top: auto;
        }
        
        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }

        .order-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 74, 46, 0.25);
            background-color: var(--primary-dark);
        }

        .out-of-stock {
            background: #ccc;
            color: #666;
            border: none;
            padding: 12px 20px;
            width: 100%;
            font-weight: 500;
            border-radius: 50px;
            font-size: 16px;
            cursor: not-allowed;
            margin-top: auto;
        }

        .loading, .error {
            text-align: center;
            padding: 40px;
            color: var(--primary-dark);
            font-size: 18px;
            grid-column: 1 / -1;
        }

        .error {
            color: #d32f2f;
        }

        /* Skeleton loading styles */
        @keyframes shimmer {
          0% { background-position: -200px 0; }
          100% { background-position: 200px 0; }
        }
        .skeleton {
          background: linear-gradient(90deg, 
            #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
          background-size: 400px 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 4px;
        }
        .skeleton-img {
          height: 200px;
          border-radius: 16px 16px 0 0;
        }
        .skeleton-title {
          height: 20px;
          margin: 16px 0 12px 0;
          border-radius: 4px;
          width: 60%;
        }
        .skeleton-text {
          height: 14px;
          margin-bottom: 12px;
          border-radius: 4px;
          width: 80%;
        }
        .skeleton-price {
          height: 18px;
          margin: 15px 0;
          border-radius: 4px;
          width: 50%;
        }
        .skeleton-button {
          height: 36px;
          margin-top: auto;
          border-radius: 50px;
          width: 80%;
        }

         @keyframes slideDown {
             from {
                 opacity: 0;
                 transform: translateY(-10px);
             }
             to {
                 opacity: 1;
                 transform: translateY(0);
             }
         }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                background: var(--primary-dark);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding: 0;
                animation: slideDown 0.3s ease;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                width: 100%;
            }

            .nav-links a {
                display: block;
                padding: 15px 20px;
                color: var(--primary-gold);
                text-decoration: none;
                font-size: 16px;
                font-weight: 500;
                transition: color 0.3s;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .nav-links a:last-child {
                border-bottom: none;
            }

            .nav-links a:hover {
                color: white;
                background: rgba(255, 255, 255, 0.1);
            }

            .menu-toggle {
                display: block;
            }

            .page-heading {
                font-size: 32px;
            }

            .section-heading {
                font-size: 28px;
            }
        }

        footer {
            background: var(--primary-dark);
            color: white;
            text-align: center;
            padding: 50px 5%;
        }

        footer p {
            margin: 10px 0;
        }

        footer .small {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .scroll-to-top {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: var(--primary-dark);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s, transform 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .scroll-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-to-top:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo-container">
            <div class="logo">Susan's Company</div>
            <div class="tagline">Modest Fashion & Books</div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="menu-toggle" id="menuToggle">☰</button>
    </nav>

    <section>
        <h1 class="page-heading">Our Products</h1>
        
        <div id="loading-message" class="loading">Loading products...</div>
        <div id="error-message" class="error" style="display: none;"></div>
        
        <!-- Search and Filter Controls -->
        <div class="product-filters">
            <input type="text" id="search-input" placeholder="🔍 Search products...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Products</button>
                <button class="filter-btn" data-filter="clothes">Clothes</button>
                <button class="filter-btn" data-filter="books">Books</button>
                <button class="filter-btn" data-filter="sale">On Sale</button>
            </div>
        </div>
        
<!-- Product Count (above grid) -->
         <div id="product-count" class="product-count" style="text-align: center; margin: 0 0 15px 0; color: var(--primary-dark); font-size: 14px; font-weight: 500;"></div>

<!-- Products Container -->
         <div id="products-container" class="products"></div>
         
         <!-- Load More Button -->
         <div id="load-more-container" style="text-align: center; margin: 30px 0;">
             <button id="load-more-btn" class="filter-btn" style="display: none;">Load More Products</button>
         </div>
     </section>

    <!-- Load Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase public anon credentials — safe to expose in frontend
        const supabaseUrl = 'https://kyknrxolzctljahlegsc.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5a25yeG9semN0bGphaGxlZ3NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjIzNjcsImV4cCI6MjA5NDQzODM2N30.KoJM7dKRtTwOiWIT5VmVpeNqSGJOIts2qQhWsAYoWJM';

        if (!supabaseUrl || !supabaseAnonKey) {
            console.error('Missing Supabase configuration');
        } else {
            const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

            // DOM elements
            const loadingMessage = document.getElementById('loading-message');
            const errorMessage = document.getElementById('error-message');
            const productsContainer = document.getElementById('products-container');
            const searchInput = document.getElementById('search-input');
            const filterButtons = document.querySelectorAll('.filter-btn');

// State
             let allProducts = [];
             let displayedProducts = [];
             let currentFilter = 'all';
             let currentSearch = '';
             let currentOffset = 0;
             const PRODUCTS_PER_PAGE = 12;

            // Create skeleton card element
            function createSkeletonCard() {
                const card = document.createElement('div');
                card.className = 'product-card';

                const imgDiv = document.createElement('div');
                imgDiv.className = 'skeleton-img skeleton';
                card.appendChild(imgDiv);

                const infoDiv = document.createElement('div');
                infoDiv.className = 'product-info';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'skeleton-title skeleton';
                infoDiv.appendChild(titleDiv);

                const descDiv = document.createElement('div');
                descDiv.className = 'skeleton-text skeleton';
                infoDiv.appendChild(descDiv);

                const priceDiv = document.createElement('div');
                priceDiv.className = 'skeleton-price skeleton';
                infoDiv.appendChild(priceDiv);

                const buttonDiv = document.createElement('div');
                buttonDiv.className = 'skeleton-button skeleton';
                infoDiv.appendChild(buttonDiv);

                card.appendChild(infoDiv);
                return card;
            }

// Fetch products from Supabase
             async function fetchProducts(offset = 0) {
                 // Clear any existing timeout
                 if (window.fetchTimeout) clearTimeout(window.fetchTimeout);

                 // Set 10-second timeout
                 window.fetchTimeout = setTimeout(() => {
                     productsContainer.innerHTML = '';
                     showError('Loading is taking longer than usual. Please refresh.');
                 }, 10000);

                 try {
                     loadingMessage.style.display = 'none';
                     errorMessage.style.display = 'none';

                     // Show skeleton loading cards only on initial load
                     if (offset === 0) {
                         productsContainer.innerHTML = '';
                         for (let i = 0; i < 6; i++) {
                             productsContainer.appendChild(createSkeletonCard());
                         }
                     }

                     // Fetch total count for product count display
                     const { count, error: countError } = await supabaseClient
                         .from('products')
                         .select('id', { count: 'exact', head: true });

                     if (countError) throw countError;

                     // Fetch initial 12 products
                     const { data, error } = await supabaseClient
                         .from('products')
                         .select('id, name, price, category, description, whatsapp_message, discount_price, in_stock')
                         .limit(PRODUCTS_PER_PAGE);

                     if (error) throw error;

                     if (!data || data.length === 0) {
                         // Clear skeletons and show error
                         productsContainer.innerHTML = '';
                         showError('No products found');
                         clearTimeout(window.fetchTimeout);
                         return;
                     }

                     // Store all products for filtering
                     allProducts = data;
                     currentOffset = data.length;

                     // Update product count
                     updateProductCount(data.length, count);

                     // Check if we need load more button
                     const loadMoreBtn = document.getElementById('load-more-btn');
                     if (count > PRODUCTS_PER_PAGE) {
                         loadMoreBtn.style.display = 'inline-block';
                     }

                     // Apply current filters and display
                     applyFiltersAndDisplay();

                     // Clear timeout on success
                     clearTimeout(window.fetchTimeout);

                 } catch (err) {
                     // Clear skeletons and show error
                     productsContainer.innerHTML = '';
                     showError('Products failed to load. <button id="retry-btn" style="background:none;border:none;color:var(--primary-gold);text-decoration:underline;cursor:pointer;font-size:inherit;font-weight:500;padding:0;">Try Again</button>');
                     console.error('Error fetching products:', err);
                     clearTimeout(window.fetchTimeout);
                 }
             }

             // Load more products
             async function loadMoreProducts() {
                 try {
                     const { data, error } = await supabaseClient
                         .from('products')
                         .select('id, name, price, category, description, whatsapp_message, discount_price, in_stock')
                         .range(currentOffset, currentOffset + PRODUCTS_PER_PAGE - 1);

                     if (error) throw error;

                     if (!data || data.length === 0) {
                         document.getElementById('load-more-btn').style.display = 'none';
                         return;
                     }

                     // Append new products to allProducts
                     allProducts = allProducts.concat(data);
                     currentOffset += data.length;

                     // Update product count
                     const { count } = await supabaseClient
                         .from('products')
                         .select('id', { count: 'exact', head: true });
                     updateProductCount(allProducts.length, count);

                     // Hide load more if all products loaded
                     if (currentOffset >= count) {
                         document.getElementById('load-more-btn').style.display = 'none';
                     }

                     // Apply current filters and display
                     applyFiltersAndDisplay();

                 } catch (err) {
                     showError('Failed to load more products');
                     console.error('Error loading more products:', err);
                 }
             }

             // Update product count display
             function updateProductCount(displayed, filterLabel) {
                 document.getElementById('product-count').textContent = `Showing ${displayed}${filterLabel} product${displayed !== 1 ? 's' : ''}`;
             }

            // Apply filters and display products
            function applyFiltersAndDisplay() {
                // Filter by search term
                let filteredProducts = allProducts.filter(product => 
                    product.name.toLowerCase().includes(currentSearch.toLowerCase())
                );

                // Filter by category/sale
                if (currentFilter === 'clothes') {
                    filteredProducts = filteredProducts.filter(product => product.category === 'clothes');
                } else if (currentFilter === 'books') {
                    filteredProducts = filteredProducts.filter(product => product.category === 'books');
                } else if (currentFilter === 'sale') {
                    filteredProducts = filteredProducts.filter(product => product.discount_price !== null);
                }
                // 'all' filter keeps all products (no additional filtering)

                // Display products
                displayProducts(filteredProducts);

                // Update product count with filter context
                const filterLabel = currentFilter === 'all'
                    ? ''
                    : currentFilter === 'clothes'
                        ? ' clothes'
                        : currentFilter === 'books'
                            ? ' books'
                            : ' on sale';
                updateProductCount(filteredProducts.length, filterLabel);
            }

            // Display products in the container
            function displayProducts(products) {
                // Clear container
                productsContainer.innerHTML = '';

                if (products.length === 0) {
                    productsContainer.innerHTML = '<p style="text-align:center;color:var(--text-light);font-size:18px;padding:40px 0;">🔍 No products found. Try a different filter.</p>';
                    return;
                }

                // Create and append product cards
                products.forEach(product => {
                    const productCard = createProductCard(product);
                    productsContainer.appendChild(productCard);
                });
            }

            // Create product card element
            function createProductCard(product) {
                const card = document.createElement('div');
                card.className = 'product-card';

                const imgDiv = document.createElement('div');
                imgDiv.className = 'product-img';
                imgDiv.textContent = product.name.substring(0, 15) + (product.name.length > 15 ? '...' : '');
                card.appendChild(imgDiv);

                const infoDiv = document.createElement('div');
                infoDiv.className = 'product-info';

                const nameH3 = document.createElement('h3');
                nameH3.textContent = product.name;
                infoDiv.appendChild(nameH3);

                const descP = document.createElement('p');
                descP.textContent = product.description || 'No description available';
                infoDiv.appendChild(descP);

                const priceDiv = document.createElement('div');
                priceDiv.className = 'price';

                if (product.discount_price && product.discount_price > 0) {
                    const originalPrice = document.createElement('div');
                    originalPrice.className = 'original-price';
                    originalPrice.textContent = `KSh ${product.price ? product.price.toLocaleString() : '0'}`;
                    priceDiv.appendChild(originalPrice);

                    const discountPrice = document.createElement('div');
                    discountPrice.className = 'discount-price';
                    discountPrice.textContent = `KSh ${product.discount_price.toLocaleString()}`;
                    priceDiv.appendChild(discountPrice);
                } else {
                    priceDiv.textContent = `KSh ${product.price ? product.price.toLocaleString() : '0'}`;
                }
                infoDiv.appendChild(priceDiv);

                // Add order button or out of stock message
                if (product.in_stock !== false) {
                    const orderBtn = document.createElement('button');
                    orderBtn.className = 'order-btn';
                    orderBtn.textContent = 'Order Now';
                    orderBtn.addEventListener('click', async function() {
                        // Save order to Supabase
                        try {
                            await supabaseClient
                                .from('orders')
                                .insert({
                                    product_name: product.name,
                                    product_id: product.id,
                                    status: 'pending'
                                });
                            
                            // Show toast notification
                            showToast('Opening WhatsApp... Your order is being tracked!');
                            
                            // Open WhatsApp
                            window.open(`https://wa.me/254700000000?text=${encodeURIComponent(product.whatsapp_message || 'I would like to place an order')}`, '_blank');
                        } catch (error) {
                            console.error('Error saving order:', error);
                            showToast('Error saving order. Please try again.', 'error');
                            // Still open WhatsApp even if order saving fails
                            window.open(`https://wa.me/254700000000?text=${encodeURIComponent(product.whatsapp_message || 'I would like to place an order')}`, '_blank');
                        }
                    });
                    infoDiv.appendChild(orderBtn);
                } else {
                    const outOfStock = document.createElement('div');
                    outOfStock.className = 'out-of-stock';
                    outOfStock.textContent = 'Out of Stock';
                    infoDiv.appendChild(outOfStock);
                }

                card.appendChild(infoDiv);
                return card;
            }

             // Show error message
             function showError(message) {
                 errorMessage.innerHTML = message;
                 errorMessage.style.display = 'block';

                 // Attach retry button click handler
                 const retryBtn = document.getElementById('retry-btn');
                 if (retryBtn) {
                     retryBtn.addEventListener('click', function() {
                         fetchProducts(0);
                     });
                 }
             }

             // Show toast notification
             function showToast(message, type = 'success') {
                 const toast = document.getElementById('order-toast');
                 toast.textContent = message;
                 toast.className = 'toast show';
                 
                 // Hide toast after 3 seconds
                 setTimeout(() => {
                     toast.className = 'toast';
                 }, 3000);
             }

            // Event listeners
            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value.trim();
                applyFiltersAndDisplay();
            });

            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // Update active button
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    
                    // Update filter
                    currentFilter = button.dataset.filter;
                    
                    // Apply filters
                    applyFiltersAndDisplay();
                });
            });

            // Mobile menu toggle
            document.getElementById('menuToggle').addEventListener('click', function() {
                const navLinks = document.querySelector('.nav-links');
                navLinks.classList.toggle('active');
            });

// Close mobile menu when clicking a link
             document.querySelectorAll('.nav-links a').forEach(link => {
                 link.addEventListener('click', function() {
                     const navLinks = document.querySelector('.nav-links');
                     navLinks.classList.remove('active');
                 });
             });

             // Load more button
             document.getElementById('load-more-btn').addEventListener('click', loadMoreProducts);

             // Initialize
             document.addEventListener('DOMContentLoaded', fetchProducts);
        }
    </script>
