<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Susan's Company - Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fafaf8;
            color: #333;
            line-height: 1.6;
            font-weight: 400;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        :root {
            --primary-dark: #1a4a2e;
            --primary-gold: #c9a84c;
            --background: #fafaf8;
            --text: #333;
            --text-light: #666;
        }

        nav {
            position: sticky;
            top: 0;
            background: var(--primary-dark);
            color: var(--primary-gold);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            color: var(--primary-gold);
            font-size: 24px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tagline {
            font-size: 12px;
            color: var(--primary-gold);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .nav-links a {
            color: var(--primary-gold);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: white;
        }

        .nav-links a.active {
            color: white;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--primary-gold);
            font-size: 24px;
            cursor: pointer;
        }

        section {
            padding: 80px 5%;
        }

        .page-heading {
            text-align: center;
            color: var(--primary-dark);
            font-size: 42px;
            margin-bottom: 60px;
            font-family: 'Playfair Display', serif;
        }

        .section-heading {
            text-align: center;
            color: var(--primary-dark);
            font-size: 32px;
            margin-bottom: 40px;
            font-family: 'Playfair Display', serif;
        }

        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--primary-dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.2);
        }

        .submit-btn {
            background: var(--primary-dark);
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
            padding: 12px 20px;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            width: 100%;
            max-width: 200px;
            display: block;
            margin: 20px auto 0;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 74, 46, 0.25);
            background-color: var(--primary-dark);
        }

        .success-message,
        .error-message {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .shop-info {
            max-width: 600px;
            margin: 40px auto 0;
            text-align: center;
        }

        .shop-info h3 {
            color: var(--primary-dark);
            margin-bottom: 20px;
        }

        .shop-info p {
            margin: 10px 0;
            color: var(--text-light);
        }

        .whatsapp-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--primary-dark);
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
            text-decoration: none;
            font-weight: 500;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 74, 46, 0.25);
            background-color: var(--primary-dark);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                background: var(--primary-dark);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding: 0;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                width: 100%;
            }

            .nav-links a {
                display: block;
                padding: 15px 20px;
                color: var(--primary-gold);
                text-decoration: none;
                font-size: 16px;
                font-weight: 500;
                transition: color 0.3s;
            }

            .nav-links a:hover {
                color: white;
            }

            .menu-toggle {
                display: block;
            }

            .page-heading {
                font-size: 32px;
            }

            .section-heading {
                font-size: 28px;
            }

            .contact-form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo-container">
            <div class="logo">Susan's Company</div>
            <div class="tagline">Modest Fashion & Books — Nairobi</div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <button class="menu-toggle" id="menuToggle">☰</button>
    </nav>

    <section>
        <h1 class="page-heading">Contact Us</h1>
        
        <div id="success-message" class="success-message">Thank you! Susan will contact you shortly on WhatsApp.</div>
        <div id="error-message" class="error-message"></div>

        <div class="contact-form">
            <h2 class="section-heading">Get In Touch</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Customer Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                
                <div class="form-group">
                    <label for="interest">Product Interest</label>
                    <select id="interest" name="interest">
                        <option value="">Select an option</option>
                        <option value="Modest Hijab Dress">Modest Hijab Dress</option>
                        <option value="Women's Abaya">Women's Abaya</option>
                        <option value="Modest Blouse Set">Modest Blouse Set</option>
                        <option value="The Holy Quran">The Holy Quran</option>
                        <option value="Islamic Finance Guide">Islamic Finance Guide</option>
                        <option value="Nairobi Stories">Nairobi Stories</option>
                        <option value="Prayer Mat">Prayer Mat</option>
                        <option value="General Inquiry">General Inquiry</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

        <div class="shop-info">
            <h2 class="section-heading">Shop Information</h2>
            <p><strong>Phone:</strong> +254 700 000 000</p>
            <p><strong>Location:</strong> Nairobi, Kenya</p>
            <p><strong>Hours:</strong> Mon-Sat 8am to 6pm</p>
            <a href="https://wa.me/254700000000" class="whatsapp-btn" target="_blank">WhatsApp</a>
        </div>
    </section>

    <!-- Load Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://kyknrxolzctljahlegsc.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5a25yeG9semN0bGphaGxlZ3NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjIzNjcsImV4cCI6MjA5NDQzODM2N30.KoJM7dKRtTwOiWIT5VmVpeNqSGJOIts2qQhWsAYoWJM';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        // DOM elements
        const form = document.getElementById('contactForm');
        const successMessage = document.getElementById('success-message');
        const errorMessage = document.getElementById('error-message');

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            errorMessage.textContent = '';

            // Get form data
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                // Insert into Supabase messages table
                const { error } = await supabaseClient
                    .from('messages')
                    .insert([
                        {
                            name: data.name,
                            phone: data.phone,
                            product_interest: data.interest,
                            message: data.message,
                            created_at: new Date().toISOString()
                        }
                    ]);

                if (error) throw error;

                // Show success message
                successMessage.style.display = 'block';
                
                // Reset form
                form.reset();
            } catch (err) {
                console.error('Error submitting form:', err);
                errorMessage.textContent = 'Failed to send message. Please try again.';
                errorMessage.style.display = 'block';
            }
        });

        // Mobile menu toggle
        document.getElementById('menuToggle').addEventListener('click', function() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        });

        // Close mobile menu when clicking a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', function() {
                const navLinks = document.querySelector('.nav-links');
                navLinks.classList.remove('active');
            });
        });
    </script>
</body>
</html>
